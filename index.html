<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Links CSS style file-->
        <link href="style.css" rel="stylesheet">
        <!-- Enshures unusual characters are also displayed-->
        <meta charset="UTF-8">
        <!-- Resizes in smaller devices-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Simple Calculator</title>
    </head>
    <body>
        <header>
            <!-- Displays the masthead-->
            <div class="masthead galss-style">
                <img class="logo glassy" src="images/calculator-logo.svg" alt="calculator-logo">
                <h1>Simple Calculator</h1>
            </div>
        </header>
        <main>
            <!-- Simple welcoming text-->
            <div>
                 <h2>Welcome to simple calculator!</h2>
            </div>

            <!-- Displays the calculator-->
            <div class="calculator glass-style">
                <!-- Calculator's display screen-->
                <div id="display" class="glass-style">0</div>
                <button id="clear-btn">CLEAR</button>

                <!-- Calculator's buttons-->
                <div class="button">
                    <button id="seven" class="glass-style">7</button>
                    <button id="eight" class="glass-style">8</button>
                    <button id="nine" class="glass-style">9</button>
                    <button id="symbol_div" class="glass-style">/</button>

                    <button id="four" class="glass-style">4</button>
                    <button id="five" class="glass-style">5</button>
                    <button id="six" class="glass-style">6</button>
                    <button id="symbol_mult" class="glass-style">x</button>

                    <button id="one" class="glass-style">1</button>
                    <button id="two" class="glass-style">2</button>
                    <button id="three" class="glass-style">3</button>
                    <button id="symbol_sub" class="glass-style">-</button>

                    <button id="symbol_ooint" class="glass-style">.</button>
                    <button id="zero" class="glass-style">0</button>
                    <button id="symbol_equal">=</button>
                    <button id="symbol_add" class="glass-style">+</button>
                </div>
                <div id="bottom-slash"></div>
            </div>
        </main>
        <footer>
            <!-- Displays basic footer-->
            <p class="footerText">&copy; 2026 Code & Curiosity</p>
        </footer>

        <!-- Adds the JavaScript-->
        <script src="script.js"></script>
    </body>
</html>
